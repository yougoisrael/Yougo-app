<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUGO - تطبيق توصيل</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700&display=swap">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background-color: #C8102E;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin: 0;
        }
        .nav {
            background-color: #fff;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }
        .nav li {
            margin-right: 20px;
        }
        .nav a {
            text-decoration: none;
            color: #C8102E;
        }
        .nav a:hover {
            color: #fff;
            background-color: #C8102E;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background-color: #fff;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .card h2 {
            font-size: 18px;
            margin: 0;
        }
        .card p {
            font-size: 14px;
            margin: 10px 0;
        }
        .footer {
            background-color: #C8102E;
            color: #fff;
            padding: 10px;
            text-align: center;
            clear: both;
        }
        .footer p {
            font-size: 14px;
            margin: 0;
        }
        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
            }
            .nav ul {
                flex-direction: column;
            }
            .nav li {
                margin-right: 0;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>YOUGO - تطبيق توصيل</h1>
        </div>
        <div class="nav">
            <ul>
                <li><a href="#">الرئيسية</a></li>
                <li><a href="#">من نحن</a></li>
                <li><a href="#">خدماتنا</a></li>
                <li><a href="#">اتصل بنا</a></li>
            </ul>
        </div>
        <div class="content">
            <div class="card">
                <h2>توصيل الطعام</h2>
                <p>نقدم لك أفضل خدمات توصيل الطعام في المدينة</p>
            </div>
            <div class="card">
                <h2>توصيل البضائع</h2>
                <p>نقدم لك أفضل خدمات توصيل البضائع في المدينة</p>
            </div>
            <div class="card">
                <h2>توصيل السيارات</h2>
                <p>نقدم لك أفضل خدمات توصيل السيارات في المدينة</p>
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2024 YOUGO - تطبيق توصيل</p>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const nav = document.querySelector(".nav");
            const navLinks = document.querySelectorAll(".nav a");
            navLinks.forEach(function(link) {
                link.addEventListener("click", function() {
                    navLinks.forEach(function(link) {
                        link.classList.remove("active");
                    });
                    link.classList.add("active");
                });
            });
        });
    </script>
</body>
</html>
