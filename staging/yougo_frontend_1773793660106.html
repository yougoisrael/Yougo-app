<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUGO - تسجيل</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700&display=swap">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f7f7f7;
            direction: rtl;
        }
        .container {
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
        }
        .form-group input {
            width: 100%;
            height: 40px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group input:focus {
            border-color: #C8102E;
        }
        .btn {
            width: 100%;
            height: 40px;
            background-color: #C8102E;
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #b30a2a;
        }
        .lang {
            text-align: center;
            margin-top: 20px;
        }
        .lang a {
            margin: 0 10px;
            color: #C8102E;
            text-decoration: none;
        }
        .lang a:hover {
            color: #b30a2a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="logo.png" alt="YOUGO">
        </div>
        <form>
            <div class="form-group">
                <label for="name">اسم المستخدم</label>
                <input type="text" id="name" placeholder="اسم المستخدم">
            </div>
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="البريد الإلكتروني">
            </div>
            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" placeholder="كلمة المرور">
            </div>
            <div class="form-group">
                <label for="confirm-password">تأكيد كلمة المرور</label>
                <input type="password" id="confirm-password" placeholder="تأكيد كلمة المرور">
            </div>
            <button class="btn">تسجيل</button>
        </form>
        <div class="lang">
            <a href="#" lang="he">עברית</a> | <a href="#" lang="ar">عربي</a>
        </div>
    </div>
    <script>
        const langLinks = document.querySelectorAll('.lang a');
        langLinks.forEach(link => {
            link.addEventListener('click', event => {
                event.preventDefault();
                const lang = link.getAttribute('lang');
                document.documentElement.lang = lang;
                document.documentElement.dir = lang === 'he' ? 'ltr' : 'rtl';
            });
        });
    </script>
</body>
</html>
